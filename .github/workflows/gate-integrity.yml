name: GateIntegrity
on:
  pull_request_target:
    branches: [probe-base]
jobs:
  gate-integrity:
    runs-on: ubuntu-latest
    steps:
      # pull_request_target runs THIS FILE FROM THE BASE BRANCH.
      # The PR head cannot edit the thing judging it.
      # We check out head as DATA ONLY and never execute it.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Audit the gate SOURCE (static parse, no execution)
        run: |
          set -euo pipefail
          if grep -q "continue-on-error" .github/workflows/quality.yml; then
            echo "::error::continue-on-error found in quality.yml — the gate can no longer fail."
            exit 1
          fi
          echo "OK: no continue-on-error in the gate"
